version: "1"

variables:
  project_name: CoachIQ
  owner_team: platform-engineering
  default_language: de
  governance_level: strict

targets:
  gitlab:
    description: GitLab Duo Agent Platform with full DevSecOps SDLC skills
    platforms:
      - gitlab-duo
    profiles:
      - base
      - gitlab-governance
      - devsecops
      - documentation
    skills:
      - requirements-analyst
      - cost-based-planner
      - architecture-reviewer
      - threat-modeler
      - safe-implementer
      - test-strategy-engineer
      - verification-reviewer
      - security-reviewer
      - secrets-reviewer
      - dependency-supply-chain-reviewer
      - ci-cd-reviewer
      - iac-gitops-reviewer
      - compliance-governance-reviewer
      - release-readiness-reviewer
      - observability-reviewer
      - incident-postmortem-assistant
      - documentation-maintainer
      - universal-skill-creator
    rules:
      no_direct_push: true
      require_merge_request: true
      require_tests: true
      require_security_review: true
      forbid_secret_files: true
      forbid_env_file_access: true
      require_diff_summary: true
      require_validation_summary: true
      allow_autonomous_changes: false
    flows:
      - secure-code-change
      - documentation-review
      - ci-cd-review
      - dependency-review
      - security-policy-review
      - iac-gitops-review
      - release-readiness-review
      - incident-postmortem

  default:
    description: Default target
    inherits:
      - gitlab
