version: '1'
variables:
  project_name: agentic-template-kit
  owner_team: platform-engineering
  default_language: de
  governance_level: strict
skill_sources:
  output_dir: .agents/skills
  defaults:
    version: "1.0.0"
    owner: platform-engineering
    license: MIT
    compatible_with:
      - codex
      - claude-code
      - github-copilot
      - gitlab-duo
      - opencode
      - openhands
      - ollama
      - cursor
      - roo-code
      - kiro
      - junie
      - gemini-cli
      - windsurf
  skills:
    - name: requirements-analyst
      description: "Decompose requirements into unambiguous, testable acceptance criteria; surface security, compliance, and privacy obligations before design begins."
    - name: cost-based-planner
      description: "Estimate and track effort, cost drivers, and scope trade-offs; produce budget-aware implementation plans with explicit risk and uncertainty."
    - name: architecture-reviewer
      description: "Evaluate module boundaries, coupling, dependency direction, API contracts, and security-by-design properties of architectural changes."
    - name: threat-modeler
      description: "Perform STRIDE threat modeling to produce a threat register, attack-surface map, and prioritized control recommendations."
    - name: safe-implementer
      description: "Implement requested changes minimally and safely with test coverage, validated inputs, no secrets, and a documented rollback path."
    - name: test-strategy-engineer
      description: "Design a test strategy covering unit, integration, contract, security, and edge-case tests with CI gate configuration and flaky-test mitigation."
    - name: verification-reviewer
      description: "Verify that implementation satisfies acceptance criteria; produce a validation evidence summary with pass, conditional pass, or block recommendation."
    - name: security-reviewer
      description: "Review code changes for injection, AuthZ bypass, SSRF, path traversal, unsafe logging, insecure defaults, and OWASP Top 10 risks."
    - name: secrets-reviewer
      description: "Detect secrets, credentials, and tokens in code, configuration, CI/CD pipelines, and git history; produce rotation, revocation, and prevention plans."
    - name: dependency-supply-chain-reviewer
      description: "Review dependencies for CVEs, license conflicts, lockfile gaps, SBOM coverage, provenance, and supply-chain attack vectors."
    - name: ci-cd-reviewer
      description: "Review CI/CD pipelines for token permissions, cache poisoning, artifact integrity, runner trust, and deployment gate risks."
    - name: iac-gitops-reviewer
      description: "Review Terraform, Kubernetes, Helm, and GitOps configurations for IAM/RBAC least privilege, drift, network exposure, and rollback gaps."
    - name: compliance-governance-reviewer
      description: "Map controls to audit evidence, assess segregation of duties, identify policy exceptions, and produce an audit-ready evidence package."
    - name: release-readiness-reviewer
      description: "Assess release readiness with go/no-go recommendation covering test status, security findings, rollback, feature flags, and monitoring coverage."
    - name: observability-reviewer
      description: "Review logging, metrics, SLOs/SLIs, alerting, distributed tracing, correlation IDs, cardinality, and runbook coverage for operational readiness."
    - name: incident-postmortem-assistant
      description: "Support structured incident triage, timeline reconstruction, root cause analysis, severity classification, corrective actions, and blameless postmortem production."
    - name: documentation-maintainer
      description: "Create and update README quickstart guides, ADRs, setup guides, API docs, runbooks, changelogs, and release notes for accuracy and completeness."
    - name: universal-skill-creator
      description: "Generate new domain-specific, production-ready SKILL.md files with complete anti-patterns, compatibility metadata, and changelog — never generic copy-paste templates."
targets:
  codex:
    description: Codex AGENTS.md and project skills
    inherits: []
    platforms:
    - codex
    - claude-code
    - github-copilot
    - gitlab-duo
    - opencode
    - openhands
    - ollama
    - cursor
    - roo-code
    - kiro
    - junie
    - gemini-cli
    - windsurf
    profiles:
    - base
    - devsecops
    skills:
    - requirements-analyst
    - cost-based-planner
    - architecture-reviewer
    - threat-modeler
    - safe-implementer
    - test-strategy-engineer
    - verification-reviewer
    - security-reviewer
    - secrets-reviewer
    - dependency-supply-chain-reviewer
    - ci-cd-reviewer
    - iac-gitops-reviewer
    - compliance-governance-reviewer
    - release-readiness-reviewer
    - observability-reviewer
    - incident-postmortem-assistant
    - documentation-maintainer
    - universal-skill-creator
    flows: []
    rules:
      no_direct_push: true
      require_merge_request: true
      require_tests: true
      require_security_review: true
      forbid_secret_files: true
      forbid_env_file_access: true
      require_diff_summary: true
      require_validation_summary: true
      allow_autonomous_changes: false
    model: {}
  default:
    description: Default target for this repository
    inherits:
    - codex
    platforms: []
    profiles: []
    skills: []
    flows: []
    rules: {}
    model: {}
  all:
    description: Generate all configured platform artifacts
    inherits:
    - codex
    platforms: []
    profiles: []
    skills: []
    flows: []
    rules: {}
    model: {}
