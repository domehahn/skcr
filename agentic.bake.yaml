version: '1'
variables:
  project_name: agentic-template-kit
  owner_team: platform-engineering
  default_language: de
  governance_level: strict
skill_sources:
  output_dir: .agents/skills
  defaults:
    version: "1.0.0"
    owner: platform-engineering
    license: MIT
    compatible_with:
      - codex
      - claude-code
      - github-copilot
      - gitlab-duo
      - opencode
      - openhands
      - ollama
      - cursor
      - roo-code
      - kiro
      - junie
      - gemini-cli
      - windsurf
  skills:
    - name: requirements-analyst
      description: "Decompose requirements into unambiguous, testable acceptance criteria; surface security, compliance, and privacy obligations before design begins."
    - name: threat-modeler
      description: "Perform STRIDE threat modeling to produce a threat register, attack-surface map, and prioritized control recommendations."
    - name: architecture-reviewer
      description: "Evaluate module boundaries, coupling, dependency direction, API contracts, and security-by-design properties of architectural changes."
    - name: secure-design-reviewer
      description: "Review authentication, authorization, session management, secrets handling, data classification, encryption, and audit logging before implementation."
    - name: safe-implementer
      description: "Implement requested changes minimally and safely with test coverage, validated inputs, no secrets, and a documented rollback path."
    - name: secure-code-reviewer
      description: "Review code changes for injection, authentication and authorization flaws, secrets exposure, unsafe logging, and OWASP Top 10 risks."
    - name: test-strategist
      description: "Design a test strategy covering unit, integration, contract, security, and edge-case tests with CI gate configuration."
    - name: dependency-risk-reviewer
      description: "Review dependencies and container images for CVEs, license conflicts, version pinning, and supply-chain attack vectors."
    - name: ci-cd-security-reviewer
      description: "Review CI/CD pipelines for token permissions, script injection, secrets exposure, artifact integrity, and deployment gate risks."
    - name: container-security-reviewer
      description: "Review Dockerfiles and container runtime configuration for root runtime, unpinned images, secrets in layers, and Kubernetes security context gaps."
    - name: iac-security-reviewer
      description: "Review Terraform, Kubernetes, Helm, and CloudFormation configurations for IAM least privilege, network exposure, and encryption gaps."
    - name: secrets-auditor
      description: "Detect secrets, credentials, and tokens in code, configuration, CI/CD pipelines, and git history; produce rotation and prevention plans."
    - name: privacy-reviewer
      description: "Identify personal data flows, assess legal basis and data minimization, flag retention and logging risks, and assess DPIA necessity."
    - name: release-readiness-reviewer
      description: "Assess release readiness with Go/No-Go recommendation covering test status, security findings, rollback, migrations, and monitoring coverage."
    - name: incident-response-helper
      description: "Support structured incident triage, containment, eradication, recovery, RCA, and blameless postmortem production."
    - name: compliance-evidence-collector
      description: "Map compliance controls to evidence, assess evidence quality, identify gaps, and produce an audit-ready evidence package."
    - name: policy-as-code-reviewer
      description: "Review OPA/Rego, Kyverno, and Kubernetes admission policies for logic correctness, coverage, test completeness, and bypass risks."
    - name: observability-readiness-reviewer
      description: "Review logging, metrics, SLOs, alerting, distributed tracing, dashboards, and runbooks for operational readiness."
targets:
  codex:
    description: Codex AGENTS.md and project skills
    inherits: []
    platforms:
    - codex
    - claude-code
    - github-copilot
    - gitlab-duo
    - opencode
    - openhands
    - ollama
    - cursor
    - roo-code
    - kiro
    - junie
    - gemini-cli
    - windsurf
    profiles:
    - base
    - devsecops
    skills:
    - requirements-analyst
    - threat-modeler
    - architecture-reviewer
    - secure-design-reviewer
    - safe-implementer
    - secure-code-reviewer
    - test-strategist
    - dependency-risk-reviewer
    - ci-cd-security-reviewer
    - container-security-reviewer
    - iac-security-reviewer
    - secrets-auditor
    - privacy-reviewer
    - release-readiness-reviewer
    - incident-response-helper
    - compliance-evidence-collector
    - policy-as-code-reviewer
    - observability-readiness-reviewer
    flows: []
    rules:
      no_direct_push: true
      require_merge_request: true
      require_tests: true
      require_security_review: true
      forbid_secret_files: true
      forbid_env_file_access: true
      require_diff_summary: true
      require_validation_summary: true
      allow_autonomous_changes: false
    model: {}
  default:
    description: Default target for this repository
    inherits:
    - codex
    platforms: []
    profiles: []
    skills: []
    flows: []
    rules: {}
    model: {}
  all:
    description: Generate all configured platform artifacts
    inherits:
    - codex
    platforms: []
    profiles: []
    skills: []
    flows: []
    rules: {}
    model: {}
