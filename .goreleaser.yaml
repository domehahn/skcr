version: 2

project_name: skcr

before:
  hooks:
    - go mod tidy

builds:
  - id: skcr
    main: ./cmd/skcr
    binary: skcr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/agentic-template-kit/skcr/internal/cli.Version={{.Version}}
      - -X github.com/agentic-template-kit/skcr/internal/cli.Commit={{.Commit}}
      - -X github.com/agentic-template-kit/skcr/internal/cli.Date={{.Date}}

archives:
  - id: skcr
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
